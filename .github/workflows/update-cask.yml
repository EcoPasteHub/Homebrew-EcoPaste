name: Update Homebrew Cask

on:
  schedule:
    - cron: "0 2 * * *" # 每天 UTC 2 点（北京时间 10 点）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release version
        id: release
        run: |
          latest=$(
            curl -s "https://api.github.com/repos/EcoPasteHub/EcoPaste/releases?per_page=100" \
              | jq -r '
                  [.[] | select(.draft == false)
                    | .tag_name
                    | select(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+(-(beta|rc)\\.[0-9]+)?$"))
                  ][0]
                '
          )
          version=${latest#v}
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "No matching release version found"
            exit 1
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Read current cask metadata
        id: current
        run: |
          version=$(sed -nE 's/^  version "([^"]+)".*/\1/p' Casks/ecopaste.rb)
          sha_arm=$(sed -nE 's/^  sha256 arm:[[:space:]]*"([^"]+)".*/\1/p' Casks/ecopaste.rb)
          sha_x64=$(sed -nE 's/^         intel:[[:space:]]*"([^"]+)".*/\1/p' Casks/ecopaste.rb)

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "sha_arm=$sha_arm" >> $GITHUB_OUTPUT
          echo "sha_x64=$sha_x64" >> $GITHUB_OUTPUT

      - name: Download and calculate sha256
        id: sha
        run: |
          version=${{ steps.release.outputs.version }}
          base="https://github.com/EcoPasteHub/EcoPaste/releases/download/v${version}"

          curl -fL -o x64.tar.gz "$base/EcoPaste_${version}_x64.app.tar.gz"
          curl -fL -o arm.tar.gz "$base/EcoPaste_${version}_aarch64.app.tar.gz"

          sha_x64=$(sha256sum x64.tar.gz | awk '{print $1}')
          sha_arm=$(sha256sum arm.tar.gz | awk '{print $1}')

          echo "sha_x64=$sha_x64" >> $GITHUB_OUTPUT
          echo "sha_arm=$sha_arm" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.release.outputs.version }}" ] \
            && [ "${{ steps.current.outputs.sha_arm }}" = "${{ steps.sha.outputs.sha_arm }}" ] \
            && [ "${{ steps.current.outputs.sha_x64 }}" = "${{ steps.sha.outputs.sha_x64 }}" ]; then
            echo "update=false" >> $GITHUB_OUTPUT
          else
            echo "update=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no update
        if: steps.check.outputs.update == 'false'
        run: echo "Version and sha256 values are unchanged. Skip."

      - name: Update cask file
        if: steps.check.outputs.update == 'true'
        run: |
          version="${{ steps.release.outputs.version }}"
          sha_x64="${{ steps.sha.outputs.sha_x64 }}"
          sha_arm="${{ steps.sha.outputs.sha_arm }}"

          sed -i 's/^  version ".*"/  version "'"$version"'"/' Casks/ecopaste.rb
          sed -i '/sha256 arm:/,/intel:/ s/sha256 arm: *"[^"]*"/sha256 arm:   "'"$sha_arm"'"/' Casks/ecopaste.rb
          sed -i '/sha256 arm:/,/intel:/ s/intel: *"[^"]*"/intel: "'"$sha_x64"'"/' Casks/ecopaste.rb

      - name: Commit and push
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Casks/ecopaste.rb

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ecopaste cask to v${{ steps.release.outputs.version }}"
            git push
          fi
